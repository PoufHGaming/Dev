<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FelloGuessr</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --gold:          #c9a84c;
    --gold-light:    #e8c96a;
    --gold-dim:      #9a7a3a;
    --bg:            #07090a;
    --bg2:           #0e1418;
    --bg3:           #141e24;
    --border:        rgba(201,168,76,0.18);
    --border-bright: rgba(201,168,76,0.55);
    --text:          #f0ece0;
    --text-dim:      #a89880;
    --text-muted:    #5a5040;
    --green:         #44ee88;
    --red:           #ee4444;
    --teal:          #40d4d4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: 17px;
  }

  /* ── SCREENS ── */
  .screen { display: none; width: 100%; height: 100vh; }
  .screen.active { display: flex; }

  /* ══════════════════════════════════════════
     SCREEN : ACCUEIL
  ══════════════════════════════════════════ */
  #screen-home {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(201,168,76,0.08) 0%, transparent 60%),
      var(--bg);
  }

  .home-logo {
    text-align: center;
  }
  .home-logo-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(32px, 6vw, 64px);
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.1em;
    text-shadow: 0 0 40px rgba(201,168,76,0.4), 0 0 80px rgba(201,168,76,0.15);
  }
  .home-logo-sub {
    font-size: 15px;
    color: var(--text-muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 8px;
  }

  .home-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 32px 40px;
    width: min(440px, 90vw);
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .field label {
    display: block;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .field select, .field input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 11px 14px;
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    font-size: 17px;
    appearance: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .field select:focus, .field input:focus {
    outline: none;
    border-color: var(--border-bright);
  }

  .rounds-selector {
    display: flex;
    gap: 8px;
  }
  .rounds-btn {
    flex: 1;
    padding: 10px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-muted);
    font-family: 'Cinzel', serif;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .rounds-btn.active {
    color: var(--gold);
    border-color: var(--border-bright);
    background: rgba(201,168,76,0.08);
  }

  .btn-primary {
    width: 100%;
    padding: 14px;
    background: rgba(201,168,76,0.12);
    border: 1px solid var(--border-bright);
    border-radius: 4px;
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 14px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary:hover {
    background: rgba(201,168,76,0.2);
    box-shadow: 0 0 20px rgba(201,168,76,0.15);
  }
  .btn-primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .home-nav {
    position: absolute;
    top: 16px; left: 16px;
    display: flex; gap: 8px;
  }
  .nav-link {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-decoration: none;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 3px;
    transition: all 0.2s;
  }
  .nav-link:hover { color: var(--gold-light); border-color: var(--border-bright); }

  /* ══════════════════════════════════════════
     SCREEN : JEU
  ══════════════════════════════════════════ */
  #screen-game {
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* Screenshot plein écran */
  .screenshot-view {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #000;
  }
  .screenshot-img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    user-select: none;
    pointer-events: none;
  }
  .screenshot-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    color: var(--text-muted);
    font-size: 18px;
    font-style: italic;
  }

  /* HUD en haut */
  .game-hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: linear-gradient(to bottom, rgba(7,9,10,0.9) 0%, transparent 100%);
    z-index: 10;
    gap: 16px;
  }

  .hud-round {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
  }
  .hud-round span { color: var(--gold); font-size: 18px; }

  .hud-timer {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(201,168,76,0.5);
    min-width: 52px;
    text-align: center;
    transition: color 0.3s;
  }
  .hud-timer.urgent { color: var(--red); text-shadow: 0 0 20px rgba(238,68,68,0.5); animation: blink 0.5s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.5} }

  .hud-score {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    text-align: right;
  }
  .hud-score span { color: var(--gold); font-size: 18px; }

  /* Panel de devinette (bas) */
  .guess-panel {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, rgba(7,9,10,0.97) 60%, transparent 100%);
    padding: 20px 24px 24px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* Étape 1 : choisir le donjon */
  .step-dungeon { display: none; }
  .step-dungeon.active { display: block; }

  .step-label {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .dungeon-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .dungeon-chip {
    padding: 7px 14px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .dungeon-chip:hover { border-color: var(--border-bright); color: var(--gold-light); }
  .dungeon-chip.selected {
    background: rgba(201,168,76,0.12);
    border-color: var(--gold);
    color: var(--gold);
  }

  /* Étape 2 : placer le pin sur la map */
  .step-map { display: none; }
  .step-map.active { display: flex; gap: 16px; align-items: flex-end; }

  .map-container {
    position: relative;
    flex-shrink: 0;
    cursor: crosshair;
    border: 1px solid var(--border-bright);
    border-radius: 4px;
    overflow: hidden;
  }
  .map-img {
    display: block;
    width: 280px;
    height: 280px;
    object-fit: cover;
    user-select: none;
    pointer-events: none;
  }
  .map-pin {
    position: absolute;
    width: 24px;
    height: 24px;
    transform: translate(-50%, -100%);
    pointer-events: none;
    display: none;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8));
  }
  .map-pin svg { width: 24px; height: 24px; }

  .map-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex-shrink: 0;
  }
  .btn-confirm {
    padding: 12px 24px;
    background: rgba(201,168,76,0.12);
    border: 1px solid var(--border-bright);
    border-radius: 4px;
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-confirm:hover { background: rgba(201,168,76,0.22); }
  .btn-confirm:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-back {
    padding: 8px 16px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-muted);
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-back:hover { color: var(--text-dim); border-color: var(--border-bright); }

  /* ══════════════════════════════════════════
     SCREEN : RÉSULTAT ROUND
  ══════════════════════════════════════════ */
  #screen-result {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 32px;
    background: var(--bg);
    position: relative;
  }

  .result-title {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .result-score {
    font-family: 'Cinzel', serif;
    font-size: clamp(48px, 10vw, 88px);
    font-weight: 700;
    color: var(--gold);
    text-shadow: 0 0 40px rgba(201,168,76,0.5);
    line-height: 1;
  }
  .result-score.perfect { color: var(--green); text-shadow: 0 0 40px rgba(68,238,136,0.5); }
  .result-score.bad { color: var(--red); }

  .result-details {
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .result-dungeon {
    font-family: 'Cinzel', serif;
    font-size: 16px;
    color: var(--text-dim);
  }
  .result-dungeon .correct { color: var(--green); }
  .result-dungeon .wrong   { color: var(--red); text-decoration: line-through; }
  .result-distance {
    font-size: 15px;
    color: var(--text-muted);
    font-style: italic;
  }

  /* Map résultat avec vrai point + guess */
  .result-map-wrap {
    position: relative;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .result-map-img {
    display: block;
    width: min(360px, 80vw);
    height: min(360px, 80vw);
    object-fit: cover;
  }
  .result-pin {
    position: absolute;
    pointer-events: none;
    transform: translate(-50%, -100%);
  }
  .result-pin svg { width: 22px; height: 22px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8)); }
  .result-line {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  .result-progress {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }
  .result-progress span { color: var(--gold); }

  /* ══════════════════════════════════════════
     SCREEN : FIN DE PARTIE
  ══════════════════════════════════════════ */
  #screen-final {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 32px;
    background:
      radial-gradient(ellipse 60% 40% at 50% 20%, rgba(201,168,76,0.08) 0%, transparent 60%),
      var(--bg);
  }

  .final-title {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .final-score {
    font-family: 'Cinzel', serif;
    font-size: clamp(56px, 12vw, 100px);
    font-weight: 700;
    color: var(--gold);
    text-shadow: 0 0 60px rgba(201,168,76,0.4);
    line-height: 1;
  }
  .final-max {
    font-size: 16px;
    color: var(--text-muted);
    margin-top: -12px;
    font-style: italic;
  }

  .final-rounds {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .final-round-chip {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 10px 16px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    min-width: 72px;
  }
  .final-round-chip .chip-score {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    color: var(--gold);
  }
  .final-round-chip .chip-label {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
  }

  /* ══════════════════════════════════════════
     SCREEN : LEADERBOARD
  ══════════════════════════════════════════ */
  #screen-leaderboard {
    flex-direction: column;
    padding: 32px 24px;
    gap: 24px;
    overflow-y: auto;
    background: var(--bg);
  }
  .lb-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .lb-title {
    font-family: 'Cinzel', serif;
    font-size: 20px;
    color: var(--gold);
    letter-spacing: 0.08em;
  }
  .fg-lb-header {
    display: grid;
    grid-template-columns: 40px 1fr 100px 100px 80px;
    gap: 12px;
    padding: 0 16px 10px;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
  }
  .fg-lb-row {
    display: grid;
    grid-template-columns: 40px 1fr 100px 100px 80px;
    gap: 12px;
    align-items: center;
    padding: 13px 16px;
    border: 1px solid transparent;
    border-radius: 4px;
    margin-bottom: 4px;
    transition: all 0.2s;
  }
  .fg-lb-row:hover { border-color: var(--border); background: var(--bg2); }
  .fg-lb-row.rank-1 { border-color: rgba(201,168,76,0.5); background: rgba(201,168,76,0.05); }
  .fg-lb-row.rank-2 { border-color: rgba(201,168,76,0.25); }
  .fg-lb-row.rank-3 { border-color: rgba(201,168,76,0.12); }
  .fg-rank { font-family: 'Cinzel', serif; font-size: 14px; color: var(--text-muted); text-align: center; }
  .fg-lb-row.rank-1 .fg-rank { color: var(--gold); font-size: 17px; text-shadow: 0 0 12px rgba(201,168,76,0.6); }
  .fg-name { font-size: 17px; }
  .fg-best { font-family: 'Cinzel', serif; font-size: 18px; color: var(--gold); text-align: right; }
  .fg-avg, .fg-games { font-size: 14px; color: var(--text-muted); text-align: right; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg3); border: 1px solid var(--border-bright);
    border-radius: 6px; padding: 10px 20px;
    font-size: 14px; color: var(--text); opacity: 0;
    transition: all 0.3s; pointer-events: none; z-index: 999; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Responsive */
  @media (max-width: 600px) {
    .map-img { width: 220px; height: 220px; }
    .dungeon-chip { font-size: 10px; padding: 6px 10px; }
    .fg-lb-header, .fg-lb-row { grid-template-columns: 32px 1fr 80px 70px; }
    .fg-lb-header > *:last-child, .fg-lb-row > *:last-child { display: none; }
    .home-card { padding: 24px 20px; }
  }
</style>
</head>
<body>

<!-- ══ SCREEN : ACCUEIL ══ -->
<div id="screen-home" class="screen active">
  <div class="home-nav">
    <a href="../index.html" class="nav-link">← Accueil</a>
    <button class="nav-link" onclick="showScreen('leaderboard'); loadLeaderboard()" style="cursor:pointer;background:none;">Classement</button>
  </div>

  <div class="home-logo">
    <div class="home-logo-title">FelloGuessr</div>
    <div class="home-logo-sub">Où es-tu dans Fellowship ?</div>
  </div>

  <div class="home-card">
    <div class="field">
      <label>Joueur</label>
      <select id="select-player">
        <option value="">— Choisir un joueur —</option>
      </select>
    </div>

    <div class="field">
      <label>Nombre de rounds</label>
      <div class="rounds-selector">
        <div class="rounds-btn active" data-rounds="5" onclick="selectRounds(this)">5</div>
        <div class="rounds-btn" data-rounds="10" onclick="selectRounds(this)">10</div>
        <div class="rounds-btn" data-rounds="15" onclick="selectRounds(this)">15</div>
        <div class="rounds-btn" data-rounds="20" onclick="selectRounds(this)">20</div>
      </div>
    </div>

    <button class="btn-primary" id="btn-start" onclick="startGame()" disabled>
      Lancer la partie
    </button>
  </div>
</div>

<!-- ══ SCREEN : JEU ══ -->
<div id="screen-game" class="screen">

  <!-- HUD -->
  <div class="game-hud">
    <div class="hud-round">Round <span id="hud-round-num">1</span> / <span id="hud-round-total">5</span></div>
    <div class="hud-timer" id="hud-timer">60</div>
    <div class="hud-score">Score <span id="hud-score">0</span></div>
  </div>

  <!-- Screenshot -->
  <div class="screenshot-view">
    <img class="screenshot-img" id="game-screenshot" src="" alt="" style="display:none">
    <div class="screenshot-placeholder" id="screenshot-placeholder">
      <span>📸</span>
      <span>Screenshot en chargement…</span>
    </div>
  </div>

  <!-- Panel bas -->
  <div class="guess-panel">

    <!-- Étape 1 : choisir le donjon -->
    <div class="step-dungeon active" id="step-dungeon">
      <div class="step-label">Étape 1 — Dans quel donjon ?</div>
      <div class="dungeon-grid" id="dungeon-grid"></div>
    </div>

    <!-- Étape 2 : placer le pin -->
    <div class="step-map" id="step-map">
      <div class="map-container" id="map-container" onclick="placePin(event)">
        <img class="map-img" id="map-img" src="" alt="Map">
        <div class="map-pin" id="map-pin">
          <svg viewBox="0 0 24 36" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 9 12 24 12 24s12-15 12-24C24 5.37 18.63 0 12 0z" fill="#e8c96a"/>
            <circle cx="12" cy="12" r="5" fill="#07090a"/>
          </svg>
        </div>
      </div>
      <div class="map-actions">
        <div style="font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.12em;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px;" id="selected-dungeon-label">—</div>
        <button class="btn-confirm" id="btn-confirm" onclick="confirmGuess()" disabled>
          Confirmer →
        </button>
        <button class="btn-back" onclick="backToDungeons()">
          ← Changer de donjon
        </button>
      </div>
    </div>

  </div>
</div>

<!-- ══ SCREEN : RÉSULTAT ROUND ══ -->
<div id="screen-result" class="screen">
  <div class="result-title" id="result-round-label">Round 1 / 5</div>
  <div class="result-score" id="result-score">0</div>
  <div class="result-details">
    <div class="result-dungeon" id="result-dungeon-text"></div>
    <div class="result-distance" id="result-distance-text"></div>
  </div>
  <div class="result-map-wrap">
    <img class="result-map-img" id="result-map-img" src="" alt="">
    <svg class="result-line" id="result-svg" viewBox="0 0 360 360" preserveAspectRatio="none"></svg>
    <!-- Pin vrai emplacement (vert) -->
    <div class="result-pin" id="result-pin-true" style="color:var(--green)">
      <svg viewBox="0 0 24 36" fill="none"><path d="M12 0C5.37 0 0 5.37 0 12c0 9 12 24 12 24s12-15 12-24C24 5.37 18.63 0 12 0z" fill="#44ee88"/><circle cx="12" cy="12" r="5" fill="#07090a"/></svg>
    </div>
    <!-- Pin guess (rouge si mauvais donjon, or si bon) -->
    <div class="result-pin" id="result-pin-guess">
      <svg viewBox="0 0 24 36" fill="none" id="result-pin-guess-svg"><path d="M12 0C5.37 0 0 5.37 0 12c0 9 12 24 12 24s12-15 12-24C24 5.37 18.63 0 12 0z" fill="#e8c96a"/><circle cx="12" cy="12" r="5" fill="#07090a"/></svg>
    </div>
  </div>
  <div class="result-progress">Round <span id="result-round-current">1</span> / <span id="result-round-total">5</span></div>
  <button class="btn-primary" style="max-width:280px" id="btn-next-round" onclick="nextRound()">
    Round suivant →
  </button>
</div>

<!-- ══ SCREEN : FIN DE PARTIE ══ -->
<div id="screen-final" class="screen">
  <div class="final-title">Partie terminée</div>
  <div class="final-score" id="final-score">0</div>
  <div class="final-max" id="final-max">/ 25 000 pts</div>
  <div class="final-rounds" id="final-rounds"></div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
    <button class="btn-primary" style="max-width:200px" onclick="showScreen('leaderboard'); loadLeaderboard()">
      Classement
    </button>
    <button class="btn-primary" style="max-width:200px;background:none;border-color:var(--border)" onclick="showScreen('home')">
      Rejouer
    </button>
  </div>
</div>

<!-- ══ SCREEN : LEADERBOARD ══ -->
<div id="screen-leaderboard" class="screen">
  <div class="lb-top">
    <div class="lb-title">FelloGuessr — Classement</div>
    <button class="nav-link" onclick="showScreen('home')" style="cursor:pointer;background:none;border:1px solid var(--border);padding:6px 14px;border-radius:3px;color:var(--text-muted);font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;">
      ← Jouer
    </button>
  </div>
  <div class="fg-lb-header">
    <div>#</div>
    <div>Joueur</div>
    <div style="text-align:right">Meilleur</div>
    <div style="text-align:right">Moyenne</div>
    <div style="text-align:right">Parties</div>
  </div>
  <div id="fg-lb-content">
    <div style="text-align:center;padding:48px;color:var(--text-muted);font-style:italic;">Chargement…</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══ CONFIG ══════════════════════════════════════════════════
const SUPABASE_URL      = 'https://ehsnzujkmtbzikdbqnjt.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_VaKW09b17IXBlU_snJ7S_g_xiwNzyvH';
const TIMER_SECONDS     = 60;
const MAX_SCORE_PER_ROUND = 5000;

const DUNGEONS = [
  "Abime des marins","Bois de L'aube","Carrière tombe-dieu",
  "Coeur de guivre","Creux Soyeux","Guet Tempete",
  "Marché d'Urrak","Sables Empyréens","Caveau de Lamespectre",
  "Coeur de Tuzari","La chute Cithrel","Saccage de Drakheim"
];

// ── SUPABASE ──
async function sbFetch(path, opts={}) {
  const res = await fetch(SUPABASE_URL + path, {
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || ''
    },
    method: opts.method || 'GET',
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  if (!res.ok) throw new Error(await res.text());
  if (res.status === 204) return null;
  return res.json();
}

// ── TOAST ──
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show';
  clearTimeout(el._t); el._t = setTimeout(() => el.className = 'toast', 3000);
}

// ── SCREENS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

// ── STATE ──
let state = {
  playerId:     null,
  playerName:   '',
  sessionId:    null,
  roundsTotal:  5,
  roundsDone:   0,
  totalScore:   0,
  roundScores:  [],
  currentLocation: null,
  selectedDungeon: null,
  guessX: null, guessY: null,
  timerInterval: null,
  timeLeft: TIMER_SECONDS,
  locations: [],       // pool de locations chargées
  usedLocations: [],   // locations déjà jouées dans cette session
};

// ── INIT ──
async function init() {
  await loadPlayers();
  buildDungeonGrid();
  document.getElementById('select-player').addEventListener('change', e => {
    state.playerId = e.target.value ? parseInt(e.target.value) : null;
    state.playerName = e.target.options[e.target.selectedIndex].text;
    document.getElementById('btn-start').disabled = !state.playerId;
  });
}

async function loadPlayers() {
  try {
    const players = await sbFetch('/rest/v1/players?select=id,name&order=name');
    const sel = document.getElementById('select-player');
    players.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.id; opt.textContent = p.name;
      sel.appendChild(opt);
    });
  } catch(e) { toast('Erreur chargement joueurs'); }
}

function selectRounds(btn) {
  document.querySelectorAll('.rounds-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.roundsTotal = parseInt(btn.dataset.rounds);
}

function buildDungeonGrid() {
  const grid = document.getElementById('dungeon-grid');
  grid.innerHTML = DUNGEONS.map(d =>
    `<div class="dungeon-chip" onclick="selectDungeon('${d}', this)">${d}</div>`
  ).join('');
}

// ── START GAME ──
async function startGame() {
  if (!state.playerId) return;
  document.getElementById('btn-start').disabled = true;

  try {
    // Charge les locations disponibles
    const locations = await sbFetch('/rest/v1/fg_locations?select=*&active=eq.true&order=random()');
    if (!locations.length) { toast('Aucune location disponible. Ajoute des screenshots via l\'admin !'); document.getElementById('btn-start').disabled = false; return; }

    // Crée la session en base
    const sessions = await sbFetch('/rest/v1/fg_sessions?select=id', {
      method: 'POST',
      prefer: 'return=representation',
      body: { player_id: state.playerId, rounds_total: state.roundsTotal }
    });
    state.sessionId  = sessions[0].id;
    state.locations  = locations;
    state.usedLocations = [];
    state.roundsDone = 0;
    state.totalScore = 0;
    state.roundScores = [];

    // Update HUD
    document.getElementById('hud-round-total').textContent = state.roundsTotal;
    document.getElementById('hud-score').textContent = '0';

    showScreen('game');
    startRound();
  } catch(e) {
    console.error(e);
    toast('Erreur démarrage partie');
    document.getElementById('btn-start').disabled = false;
  }
}

// ── ROUND ──
function startRound() {
  // Pioche une location non encore utilisée
  const available = state.locations.filter(l => !state.usedLocations.includes(l.id));
  if (!available.length || state.roundsDone >= state.roundsTotal) { endGame(); return; }

  const loc = available[Math.floor(Math.random() * available.length)];
  state.currentLocation = loc;
  state.usedLocations.push(loc.id);
  state.selectedDungeon = null;
  state.guessX = null;
  state.guessY = null;

  // Reset UI
  document.querySelectorAll('.dungeon-chip').forEach(c => c.classList.remove('selected'));
  document.getElementById('map-pin').style.display = 'none';
  document.getElementById('btn-confirm').disabled = true;
  document.getElementById('step-dungeon').classList.add('active');
  document.getElementById('step-map').classList.remove('active');

  // Screenshot
  const img = document.getElementById('game-screenshot');
  const placeholder = document.getElementById('screenshot-placeholder');
  img.style.display = 'none';
  placeholder.style.display = 'flex';
  img.onload = () => { img.style.display = 'block'; placeholder.style.display = 'none'; };
  img.src = '/' + loc.image_path;

  // HUD
  document.getElementById('hud-round-num').textContent = state.roundsDone + 1;
  document.getElementById('hud-round-total').textContent = state.roundsTotal;

  // Timer
  startTimer();
}

// ── TIMER ──
function startTimer() {
  clearInterval(state.timerInterval);
  state.timeLeft = TIMER_SECONDS;
  const el = document.getElementById('hud-timer');
  el.className = 'hud-timer';
  el.textContent = state.timeLeft;

  state.timerInterval = setInterval(() => {
    state.timeLeft--;
    el.textContent = state.timeLeft;
    if (state.timeLeft <= 10) el.className = 'hud-timer urgent';
    if (state.timeLeft <= 0) {
      clearInterval(state.timerInterval);
      // Temps écoulé → soumettre avec score 0
      submitGuess(true);
    }
  }, 1000);
}

// ── DUNGEON SELECTION ──
function selectDungeon(name, el) {
  document.querySelectorAll('.dungeon-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  state.selectedDungeon = name;

  // Charge la map du donjon sélectionné
  const loc = state.currentLocation;
  // Si c'est le bon donjon, on charge sa map — sinon on charge aussi sa map
  // (le joueur choisit la zone ET l'emplacement, même si mauvais donjon)
  document.getElementById('map-img').src = '/' + loc.map_path; // on montre la vraie map
  document.getElementById('selected-dungeon-label').textContent = name;
  document.getElementById('map-pin').style.display = 'none';
  state.guessX = null;
  state.guessY = null;
  document.getElementById('btn-confirm').disabled = true;

  document.getElementById('step-dungeon').classList.remove('active');
  document.getElementById('step-map').classList.add('active');
}

function backToDungeons() {
  state.selectedDungeon = null;
  document.getElementById('step-map').classList.remove('active');
  document.getElementById('step-dungeon').classList.add('active');
}

// ── PIN PLACEMENT ──
function placePin(e) {
  const container = document.getElementById('map-container');
  const rect = container.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;
  const y = (e.clientY - rect.top)  / rect.height;
  state.guessX = Math.max(0, Math.min(1, x));
  state.guessY = Math.max(0, Math.min(1, y));

  const pin = document.getElementById('map-pin');
  pin.style.display = 'block';
  pin.style.left = (state.guessX * 100) + '%';
  pin.style.top  = (state.guessY * 100) + '%';
  document.getElementById('btn-confirm').disabled = false;
}

// ── CONFIRM & SCORE ──
function confirmGuess() {
  clearInterval(state.timerInterval);
  submitGuess(false);
}

function calcScore(loc, guessedDungeon, gx, gy) {
  // Si mauvais donjon → pénalité fixe : score max 1000
  const dungeonCorrect = guessedDungeon === loc.dungeon_name;
  if (!dungeonCorrect) {
    return { score: 0, distance: 1.0, dungeonCorrect: false };
  }
  if (gx === null || gy === null) {
    return { score: 0, distance: 1.0, dungeonCorrect: true };
  }
  // Distance euclidienne normalisée (0 → 1)
  const dx = gx - loc.true_x;
  const dy = gy - loc.true_y;
  const dist = Math.sqrt(dx*dx + dy*dy); // max théorique ~1.41
  const distNorm = Math.min(1, dist / 0.707); // normalise sur diagonale
  // Score exponentiel à la GeoGuessr : 5000 * e^(-5 * dist)
  const score = Math.round(MAX_SCORE_PER_ROUND * Math.exp(-5 * distNorm));
  return { score, distance: distNorm, dungeonCorrect: true };
}

async function submitGuess(timedOut) {
  const loc = state.currentLocation;
  const timeTaken = TIMER_SECONDS - state.timeLeft;

  const { score, distance, dungeonCorrect } = timedOut
    ? { score: 0, distance: 1.0, dungeonCorrect: false }
    : calcScore(loc, state.selectedDungeon, state.guessX, state.guessY);

  state.totalScore += score;
  state.roundsDone++;
  state.roundScores.push({ score, round: state.roundsDone });

  // Sauvegarde en base
  try {
    await sbFetch('/rest/v1/fg_guesses', {
      method: 'POST',
      prefer: 'return=minimal',
      body: {
        session_id:      state.sessionId,
        location_id:     loc.id,
        round_number:    state.roundsDone,
        guessed_dungeon: state.selectedDungeon || null,
        guessed_x:       state.guessX,
        guessed_y:       state.guessY,
        score,
        distance,
        time_taken_s:    timeTaken
      }
    });
    // Update session
    await sbFetch(`/rest/v1/fg_sessions?id=eq.${state.sessionId}`, {
      method: 'PATCH',
      prefer: 'return=minimal',
      body: {
        rounds_done:  state.roundsDone,
        total_score:  state.totalScore,
        status: state.roundsDone >= state.roundsTotal ? 'finished' : 'playing',
        ...(state.roundsDone >= state.roundsTotal ? { finished_at: new Date().toISOString() } : {})
      }
    });
  } catch(e) { console.error('Save error:', e); }

  showResult(score, distance, dungeonCorrect, loc, timedOut);
}

// ── RESULT SCREEN ──
function showResult(score, distance, dungeonCorrect, loc, timedOut) {
  const scoreEl = document.getElementById('result-score');
  scoreEl.textContent = score.toLocaleString('fr-FR');
  scoreEl.className = 'result-score' + (score >= 4500 ? ' perfect' : score < 500 ? ' bad' : '');

  document.getElementById('result-round-label').textContent = `Round ${state.roundsDone} / ${state.roundsTotal}`;
  document.getElementById('result-round-current').textContent = state.roundsDone;
  document.getElementById('result-round-total').textContent = state.roundsTotal;
  document.getElementById('hud-score').textContent = state.totalScore.toLocaleString('fr-FR');

  // Texte donjon
  const dungeonEl = document.getElementById('result-dungeon-text');
  if (timedOut) {
    dungeonEl.innerHTML = `⏱ Temps écoulé — <span style="color:var(--text-dim)">${loc.dungeon_name}</span>`;
  } else if (dungeonCorrect) {
    dungeonEl.innerHTML = `✓ <span class="correct">${loc.dungeon_name}</span>`;
  } else {
    dungeonEl.innerHTML = `<span class="wrong">${state.selectedDungeon || '?'}</span> → <span class="correct">${loc.dungeon_name}</span>`;
  }

  // Distance
  const distEl = document.getElementById('result-distance-text');
  if (dungeonCorrect && !timedOut && state.guessX !== null) {
    const distPct = Math.round(distance * 100);
    distEl.textContent = distPct < 5 ? 'Quasi parfait !' : `Distance : ${distPct}%`;
  } else {
    distEl.textContent = '';
  }

  // Map résultat
  const mapImg = document.getElementById('result-map-img');
  mapImg.src = '/' + loc.map_path;

  // Vrai pin (vert)
  const pinTrue = document.getElementById('result-pin-true');
  pinTrue.style.left = (loc.true_x * 100) + '%';
  pinTrue.style.top  = (loc.true_y * 100) + '%';
  pinTrue.style.display = 'block';

  // Guess pin
  const pinGuess = document.getElementById('result-pin-guess');
  const pinSvg   = document.getElementById('result-pin-guess-svg');
  if (state.guessX !== null && dungeonCorrect && !timedOut) {
    pinGuess.style.left = (state.guessX * 100) + '%';
    pinGuess.style.top  = (state.guessY * 100) + '%';
    pinGuess.style.display = 'block';
    // Ligne entre les deux points
    const svg = document.getElementById('result-svg');
    const x1 = loc.true_x * 360, y1 = loc.true_y * 360;
    const x2 = state.guessX * 360, y2 = state.guessY * 360;
    svg.innerHTML = `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-dasharray="6,4"/>`;
  } else {
    pinGuess.style.display = 'none';
    document.getElementById('result-svg').innerHTML = '';
  }

  // Bouton suivant
  const btnNext = document.getElementById('btn-next-round');
  btnNext.textContent = state.roundsDone >= state.roundsTotal ? 'Voir les résultats →' : 'Round suivant →';
  btnNext.onclick = state.roundsDone >= state.roundsTotal ? endGame : nextRound;

  showScreen('result');
}

function nextRound() { showScreen('game'); startRound(); }

// ── END GAME ──
function endGame() {
  document.getElementById('final-score').textContent = state.totalScore.toLocaleString('fr-FR');
  document.getElementById('final-max').textContent = `/ ${(state.roundsTotal * MAX_SCORE_PER_ROUND).toLocaleString('fr-FR')} pts`;

  const roundsEl = document.getElementById('final-rounds');
  roundsEl.innerHTML = state.roundScores.map(r => `
    <div class="final-round-chip">
      <div class="chip-score">${r.score.toLocaleString('fr-FR')}</div>
      <div class="chip-label">Round ${r.round}</div>
    </div>
  `).join('');

  showScreen('final');
}

// ── LEADERBOARD ──
async function loadLeaderboard() {
  try {
    const data = await sbFetch('/rest/v1/fg_leaderboard?select=*');
    if (!data.length) {
      document.getElementById('fg-lb-content').innerHTML =
        '<div style="text-align:center;padding:48px;color:var(--text-muted);font-style:italic;">Aucune partie terminée.</div>';
      return;
    }
    let html = '', rank = 1;
    data.forEach(row => {
      const rc = rank <= 3 ? 'rank-' + rank : '';
      html += `<div class="fg-lb-row ${rc}">
        <div class="fg-rank">${rank}</div>
        <div class="fg-name">${row.player_name}</div>
        <div class="fg-best">${row.best_score.toLocaleString('fr-FR')}</div>
        <div class="fg-avg">${row.avg_score.toLocaleString('fr-FR')}</div>
        <div class="fg-games">${row.sessions_played}</div>
      </div>`;
      rank++;
    });
    document.getElementById('fg-lb-content').innerHTML = html;
  } catch(e) {
    document.getElementById('fg-lb-content').innerHTML =
      '<div style="text-align:center;padding:48px;color:var(--text-muted);">Erreur de chargement.</div>';
  }
}

// ── START ──
init();
</script>
</body>
</html>
