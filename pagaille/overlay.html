<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Overlay — Boss tués</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Pro:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* Fond transparent pour OBS */
    html, body {
      background: transparent;
      width: 320px;
      height: auto;
      overflow: hidden;
      font-family: 'Crimson Pro', Georgia, serif;
    }

    .overlay {
      display: inline-flex;
      flex-direction: column;
      gap: 8px;
      padding: 14px 18px 16px;
      background: rgba(7, 11, 11, 0.82);
      border: 1px solid rgba(64, 212, 212, 0.35);
      border-radius: 8px;
      backdrop-filter: blur(8px);
      min-width: 260px;
    }

    /* Ligne du haut : label + chiffre */
    .top-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }
    .label {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(64, 212, 212, 0.6);
      white-space: nowrap;
    }
    .kills {
      font-family: 'Cinzel', serif;
      font-size: 32px;
      font-weight: 700;
      color: #72e8e8;
      text-shadow: 0 0 24px rgba(64, 212, 212, 0.7);
      line-height: 1;
      letter-spacing: 0.04em;
    }

    /* Barre de progression */
    .bar-section { display: flex; flex-direction: column; gap: 5px; }
    .bar-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(159, 216, 216, 0.5);
    }
    .bar-meta .next-tier { color: rgba(159, 216, 216, 0.8); }
    .bar-meta .remaining { color: rgba(77, 128, 128, 0.9); }

    .bar-track {
      height: 6px;
      background: rgba(13, 26, 26, 0.9);
      border-radius: 3px;
      border: 1px solid rgba(64, 212, 212, 0.15);
      overflow: hidden;
      position: relative;
    }
    .bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }
    .bar-fill::after {
      content: '';
      position: absolute;
      right: -1px; top: 1px; bottom: 1px;
      width: 3px;
      background: white;
      border-radius: 2px;
      opacity: 0.9;
      box-shadow: 0 0 6px white;
    }
    /* Couleurs selon palier */
    .bar-fill.t1 {
      background: linear-gradient(90deg, #1a991a, #44ee44);
      box-shadow: 0 0 8px rgba(68, 238, 68, 0.6);
    }
    .bar-fill.t2 {
      background: linear-gradient(90deg, #1a991a, #44ee44 30%, #1f8888, #40d4d4);
      box-shadow: 0 0 8px rgba(64, 212, 212, 0.6);
    }
    .bar-fill.t3 {
      background: linear-gradient(90deg, #1a991a, #44ee44 20%, #1f8888, #40d4d4 55%, #7744cc, #c4a0ff);
      box-shadow: 0 0 8px rgba(196, 160, 255, 0.6);
    }
    .bar-fill.done {
      background: linear-gradient(90deg, #7744cc, #c4a0ff);
      box-shadow: 0 0 8px rgba(196, 160, 255, 0.8);
    }

    /* Badge palier débloqué */
    .tier-badge {
      display: none;
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .tier-badge.t3-done {
      display: inline-block;
      color: #c4a0ff;
      background: rgba(196, 160, 255, 0.1);
      border: 1px solid rgba(196, 160, 255, 0.4);
    }

    /* Sync indicator */
    .sync-row {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 2px;
    }
    .sync-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(77, 128, 128, 0.6);
      flex-shrink: 0;
    }
    .sync-dot.ok   { background: #44ee44; box-shadow: 0 0 4px #44ee44; }
    .sync-dot.live { background: #44ee44; box-shadow: 0 0 4px #44ee44; animation: pulse 2s ease-in-out infinite; }
    .sync-dot.err  { background: #f07070; box-shadow: 0 0 4px #f07070; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
    .sync-text {
      font-family: 'Cinzel', serif;
      font-size: 8px;
      letter-spacing: 0.1em;
      color: rgba(77, 128, 128, 0.7);
      font-style: italic;
    }

    /* Animation chiffre qui change */
    @keyframes pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); text-shadow: 0 0 40px rgba(64,212,212,1); }
      100% { transform: scale(1); }
    }
    .kills.updated { animation: pop 0.5s ease; }
  </style>
</head>
<body>
<div class="overlay" id="overlay">
  <div class="top-row">
    <span class="label" id="label-text">Boss tués</span>
    <span class="kills" id="kills-count">—</span>
  </div>
  <div class="bar-section">
    <div class="bar-meta">
      <span class="next-tier" id="next-tier-label">Palier 1 — 1 000</span>
      <span class="remaining" id="remaining-label">—</span>
    </div>
    <div class="bar-track">
      <div class="bar-fill t1" id="bar-fill" style="width:0%"></div>
    </div>
  </div>
  <div class="sync-row">
    <div class="sync-dot" id="sync-dot"></div>
    <span class="sync-text" id="sync-text">Chargement…</span>
  </div>
</div>

<script>
  const SUPABASE_URL     = 'https://ehsnzujkmtbzikdbqnjt.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_VaKW09b17IXBlU_snJ7S_g_xiwNzyvH';
  const SEASON           = 'S1';
  const N_PLAYERS        = 21;
  const TIERS_BASE       = [1000, 2500, 5000];
  const N_REF            = 20;
  const REFRESH_MS       = 60 * 1000; // 1 minute

  function computeTiers(n) {
    const factor = Math.sqrt(Math.max(1, n) / N_REF);
    return TIERS_BASE.map(b => Math.round(b * factor));
  }

  async function fetchKills() {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_pagaille_summary`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ season_filter: SEASON })
    });
    if (!res.ok) throw new Error(await res.text());
    const rows = await res.json();
    return rows.reduce((s, r) => s + (Number(r.total_kills) || 0), 0);
  }

  let lastKills = null;

  async function update() {
    const dot  = document.getElementById('sync-dot');
    const text = document.getElementById('sync-text');
    try {
      const total  = await fetchKills();
      const tiers  = computeTiers(N_PLAYERS);
      const killEl = document.getElementById('kills-count');

      // Animation si le chiffre change
      if (lastKills !== null && total !== lastKills) {
        killEl.classList.remove('updated');
        void killEl.offsetWidth; // reflow
        killEl.classList.add('updated');
      }
      lastKills = total;
      killEl.textContent = total.toLocaleString('fr-FR');

      // Prochain palier
      const nextTierIdx = tiers.findIndex(t => total < t);
      const fill    = document.getElementById('bar-fill');
      const tierLbl = document.getElementById('next-tier-label');
      const remLbl  = document.getElementById('remaining-label');

      fill.className = 'bar-fill';
      if (nextTierIdx === -1) {
        // Tout débloqué
        fill.style.width = '100%';
        fill.classList.add('done');
        tierLbl.textContent = '✓ Tous les paliers débloqués';
        remLbl.textContent  = '';
      } else {
        const nextVal  = tiers[nextTierIdx];
        const prevVal  = nextTierIdx === 0 ? 0 : tiers[nextTierIdx - 1];
        const pct      = Math.min(100, ((total - prevVal) / (nextVal - prevVal)) * 100);
        const rem      = nextVal - total;
        fill.style.width = pct + '%';
        fill.classList.add(['t1','t2','t3'][nextTierIdx]);
        tierLbl.textContent = `Palier ${nextTierIdx + 1} — ${nextVal.toLocaleString('fr-FR')}`;
        remLbl.textContent  = `encore ${rem.toLocaleString('fr-FR')}`;
      }

      // Sync indicator
      const now = new Date();
      const hh  = String(now.getHours()).padStart(2,'0');
      const mm  = String(now.getMinutes()).padStart(2,'0');
      dot.className  = 'sync-dot ok';
      text.textContent = `Mis à jour ${hh}:${mm}`;
    } catch(e) {
      dot.className  = 'sync-dot err';
      text.textContent = 'Erreur de connexion';
      console.error(e);
    }
  }

  update();
  setInterval(update, REFRESH_MS);
</script>
</body>
</html>
