<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donjon en Pagaille — Overlay</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --teal:      #40d4d4;
      --teal-light:#72e8e8;
      --teal-dim:  #2a9898;
      --tier1:     #44ee44;
      --tier2:     #40d4d4;
      --tier3:     #c4a0ff;
      --bg:        rgba(5, 10, 10, 0.88);
      --bg2:       rgba(10, 20, 20, 0.75);
      --border:    rgba(64,212,212,0.3);
      --text:      #f0fafa;
      --text-dim:  #9fd8d8;
      --text-muted:#4d8080;
      --h: 80px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1920px;
      height: var(--h);
      overflow: hidden;
      background: transparent;
      font-family: 'Cinzel', serif;
    }

    /* ── HUD CONTAINER ── */
    .hud {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--h);
      display: flex;
      flex-direction: column;
      background: var(--bg);
      border-top: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }

    /* Trait lumineux en haut */
    .hud::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg,
        transparent 0%, var(--teal-dim) 15%,
        var(--teal) 50%, var(--teal-dim) 85%, transparent 100%
      );
      z-index: 2;
    }

    /* ── LIGNE PRINCIPALE ── */
    .hud-main {
      display: flex;
      align-items: stretch;
      flex: 1;
      min-height: 0;
    }

    /* ── SECTION GAUCHE — fixe ── */
    .hud-left {
      flex-shrink: 0;
      width: 380px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 20px;
      border-right: 1px solid var(--border);
      position: relative;
      overflow: visible;
    }

    .event-label {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex-shrink: 0;
    }
    .event-name {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-dim);
      font-weight: 600;
    }
    .event-season {
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--teal-light);
      font-weight: 700;
    }

    .divider-v { width: 1px; background: var(--border); align-self: stretch; margin: 10px 0; flex-shrink:0; }

    /* Compteur kills */
    .kills-block {
      display: flex;
      flex-direction: column;
      gap: 1px;
      flex-shrink: 0;
      position: relative;
    }
    .kills-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      font-weight: 600;
    }
    .kills-count {
      font-size: 34px;
      font-weight: 700;
      color: var(--teal-light);
      letter-spacing: 0.05em;
      line-height: 1;
      text-shadow: 0 0 24px rgba(64,212,212,0.85), 0 0 2px rgba(64,212,212,0.5);
      transition: color 0.3s;
      position: relative;
      display: inline-block;
    }
    .kills-count.bump {
      color: #fff;
      text-shadow: 0 0 30px rgba(255,255,255,0.9), 0 0 60px rgba(64,212,212,0.5);
    }

    /* Halo qui pulse derrière le chiffre au kill */
    .kills-burst-ring {
      position: absolute;
      left: 0; top: 50%;
      width: 70px; height: 70px;
      transform: translate(-18px, -50%) scale(0.3);
      border-radius: 50%;
      border: 2px solid rgba(64,212,212,0.8);
      opacity: 0;
      pointer-events: none;
      z-index: 0;
    }
    .kills-burst-ring.go {
      animation: burstRing 0.7s cubic-bezier(0.2,0.7,0.3,1) forwards;
    }
    @keyframes burstRing {
      0%   { opacity: 0.9; transform: translate(-18px, -50%) scale(0.3); }
      60%  { opacity: 0.5; }
      100% { opacity: 0; transform: translate(-18px, -50%) scale(1.8); }
    }

    /* Petit "+N" qui s'envole au-dessus du compteur */
    .kills-pop {
      position: absolute;
      left: 4px; top: 0;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 0 12px rgba(64,212,212,0.9);
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
      z-index: 1;
    }
    .kills-pop.go {
      animation: popFloat 0.9s ease-out forwards;
    }
    @keyframes popFloat {
      0%   { opacity: 0; transform: translateY(4px) scale(0.8); }
      15%  { opacity: 1; transform: translateY(-2px) scale(1.05); }
      75%  { opacity: 1; transform: translateY(-22px) scale(1); }
      100% { opacity: 0; transform: translateY(-30px) scale(0.95); }
    }

    /* Étincelles autour du compteur */
    .kills-spark {
      position: absolute;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--teal-light);
      box-shadow: 0 0 6px 1px rgba(64,212,212,0.9);
      left: 0; top: 50%;
      opacity: 0;
      pointer-events: none;
      z-index: 1;
    }
    .kills-spark.go {
      animation: sparkFly 0.6s ease-out forwards;
    }
    @keyframes sparkFly {
      0%   { opacity: 1; transform: translate(0,0) scale(1); }
      100% { opacity: 0; transform: translate(var(--sx,30px), var(--sy,-20px)) scale(0.2); }
    }

    /* Next tier compact */
    .next-tier-block {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex-shrink: 0;
    }
    .next-tier-label {
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--text-dim);
      text-transform: uppercase;
      font-weight: 600;
    }
    .next-tier-value {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      transition: color 0.3s;
    }
    .next-tier-remain {
      font-size: 11px;
      letter-spacing: 0.08em;
      font-weight: 600;
      color: var(--text-dim);
      transition: color 0.3s;
    }
    /* Couleurs vives par palier, contrastées sur fond noir/transparent */
    .next-tier-value.tier-1, .next-tier-remain.tier-1 { color: #5dff5d; text-shadow: 0 0 10px rgba(93,255,93,0.5); }
    .next-tier-value.tier-2, .next-tier-remain.tier-2 { color: #5df0f0; text-shadow: 0 0 10px rgba(93,240,240,0.5); }
    .next-tier-value.tier-3, .next-tier-remain.tier-3 { color: #d4aaff; text-shadow: 0 0 10px rgba(212,170,255,0.5); }
    .next-tier-value.tier-done, .next-tier-remain.tier-done { color: #5dff5d; text-shadow: 0 0 12px rgba(93,255,93,0.6); }

    /* ── SÉPARATEUR CENTRAL ── */
    .hud-sep {
      flex-shrink: 0;
      width: 1px;
      background: var(--border);
    }

    /* ── SECTION DROITE — rotation ── */
    .hud-right {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    /* Chaque panneau */
    .panel {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      padding: 0 28px;
      gap: 20px;
      opacity: 0;
      transform: translateX(30px);
      transition: opacity 0.5s ease, transform 0.5s ease;
      pointer-events: none;
    }
    .panel.active {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }
    .panel.exit {
      opacity: 0;
      transform: translateX(-30px);
    }

    .panel-icon { font-size: 22px; flex-shrink: 0; filter: drop-shadow(0 0 8px rgba(64,212,212,0.5)); }

    .panel-title {
      font-size: 10px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--teal-light);
      margin-bottom: 6px;
      font-weight: 700;
    }

    /* ── PANNEAU : Leaderboard ── */
    .panel-lb-rows { display: flex; gap: 10px; align-items: center; }
    .lb-entry {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 12px 4px 8px;
      background: var(--bg2); border: 1px solid var(--border); border-radius: 3px;
    }
    .lb-rank { font-size: 11px; color: var(--text-dim); letter-spacing: 0.1em; font-weight: 700; min-width: 18px; }
    .lb-entry.r1 { border-color: rgba(64,212,212,0.6); }
    .lb-entry.r1 .lb-rank { color: var(--teal-light); }
    .lb-entry.r2 { border-color: rgba(64,212,212,0.35); }
    .lb-name { font-size: 15px; color: var(--text); letter-spacing: 0.04em; font-weight: 600; max-width: 130px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lb-score { font-size: 15px; color: var(--teal-light); font-weight: 700; letter-spacing: 0.05em; text-shadow: 0 0 12px rgba(64,212,212,0.6); }

    /* ── PANNEAU : Boss meurtriers ── */
    .panel-boss-rows { display: flex; gap: 8px; align-items: center; }
    .boss-entry {
      display: flex; align-items: center; gap: 7px;
      padding: 4px 12px; border: 1px solid var(--border); border-radius: 3px;
      position: relative; overflow: hidden;
    }
    .boss-entry-bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
      opacity: 0.35; z-index: 0;
    }
    .boss-entry-overlay {
      position: absolute; inset: 0;
      background: var(--bg2); opacity: 0.55; z-index: 1;
    }
    .boss-avatar { width: 30px; height: 30px; border-radius: 50%; border: 1px solid rgba(64,212,212,0.4); object-fit: cover; flex-shrink: 0; background: rgba(64,212,212,0.05); position: relative; z-index: 2; }
    .boss-name { font-size: 14px; color: var(--text); font-weight: 600; letter-spacing: 0.04em; max-width: 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; position: relative; z-index: 2; text-shadow: 0 1px 4px rgba(0,0,0,0.8); }
    .boss-deaths { font-size: 22px; color: #ff5050; font-weight: 700; letter-spacing: 0.06em; text-shadow: 0 0 10px rgba(255,80,80,0.7), 0 1px 4px rgba(0,0,0,0.8); position: relative; z-index: 2; }

    /* ── PANNEAU : !event ── */
    .panel-event { display: flex; flex-direction: column; gap: 3px; }
    .panel-event-main { font-size: 20px; letter-spacing: 0.06em; color: var(--text); font-weight: 600; }
    .panel-event-main strong { color: var(--teal-light); font-weight: 700; text-shadow: 0 0 16px rgba(64,212,212,0.7); }
    .panel-event-sub { font-size: 11px; letter-spacing: 0.16em; color: var(--text-dim); font-weight: 600; text-transform: uppercase; }

    /* ── PANNEAU : Milestone ── */
    .panel-milestone { display: flex; flex-direction: column; gap: 3px; }
    .panel-milestone-main { font-size: 20px; font-weight: 700; letter-spacing: 0.06em; color: var(--tier1); text-shadow: 0 0 24px rgba(68,238,68,0.6); }
    .panel-milestone-sub { font-size: 11px; font-weight: 600; letter-spacing: 0.16em; color: var(--text-dim); text-transform: uppercase; }

    /* ── BARRE DE PROGRESSION EN BAS ── */
    .hud-bottom {
      height: 12px;
      position: relative;
      background: rgba(64,212,212,0.04);
      border-top: 1px solid rgba(64,212,212,0.12);
      flex-shrink: 0;
      overflow: visible;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg,
        #1a991a 0%, var(--tier1) 20%,
        #1f8888 40%, var(--tier2) 55%,
        #7744cc 78%, var(--tier3) 100%
      );
      background-size: var(--track-w, 1920px) 100%;
      background-repeat: no-repeat;
      transition: width 1.5s cubic-bezier(0.4,0,0.2,1);
      box-shadow: 0 0 10px rgba(64,212,212,0.35);
      position: relative;
    }
    /* Lueur qui glisse sur le front de la barre quand elle progresse */
    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 18px;
      background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.9) 100%);
      opacity: 0;
      filter: blur(1px);
    }
    .progress-fill.growing::after {
      animation: edgeGlow 1.5s cubic-bezier(0.4,0,0.2,1) forwards;
    }
    @keyframes edgeGlow {
      0%   { opacity: 0.95; }
      70%  { opacity: 0.6; }
      100% { opacity: 0; }
    }
    .progress-markers { position: absolute; inset: 0; pointer-events: none; }
    .tier-marker {
      position: absolute; top: 0; bottom: 0; width: 1px;
      background: rgba(255,255,255,0.3);
    }
    .tier-marker::after {
      content: attr(data-label);
      position: absolute; bottom: calc(100% + 2px);
      left: 50%; transform: translateX(-50%);
      font-size: 8px; letter-spacing: 0.1em;
      color: rgba(255,255,255,0.4);
      white-space: nowrap;
    }
    /* Fragments qui volent vers la barre et "atterrissent" sur le front de progression */
    .frag-layer {
      position: absolute;
      inset: -40px 0 0 0;
      pointer-events: none;
      overflow: visible;
      z-index: 4;
    }
    .frag {
      position: absolute;
      width: 6px; height: 6px;
      background: var(--teal-light);
      box-shadow: 0 0 8px 2px rgba(64,212,212,0.85);
      border-radius: 1px;
      opacity: 0;
      top: 0; left: 0;
      will-change: transform, opacity;
    }
    .frag.go {
      animation-name: fragFly;
      animation-timing-function: cubic-bezier(0.3,0.6,0.25,1);
      animation-fill-mode: forwards;
    }
    @keyframes fragFly {
      0%   { opacity: 1; transform: translate(var(--fx0,0px), var(--fy0,-30px)) scale(1) rotate(0deg); }
      75%  { opacity: 1; }
      100% { opacity: 0; transform: translate(var(--fx1,0px), 0px) scale(0.4) rotate(160deg); }
    }
    /* Petit flash au point d'impact sur la barre */
    .frag-impact {
      position: absolute;
      top: -3px;
      width: 14px; height: 14px;
      margin-left: -7px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.95) 0%, rgba(64,212,212,0.6) 45%, rgba(64,212,212,0) 75%);
      opacity: 0;
      pointer-events: none;
      z-index: 5;
    }
    .frag-impact.go {
      animation: impactPop 0.5s ease-out forwards;
    }
    @keyframes impactPop {
      0%   { opacity: 0.95; transform: scale(0.4); }
      100% { opacity: 0; transform: scale(2.1); }
    }

    /* ── DOTS + TIMER PANEL ── */
    .panel-dots { position: absolute; bottom: 6px; right: 16px; display: flex; gap: 5px; align-items: center; }
    .panel-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--text-muted); transition: background 0.3s, transform 0.3s; }
    .panel-dot.active { background: var(--teal-light); transform: scale(1.4); }

    @keyframes killbump {
      0%   { transform: scale(1); }
      30%  { transform: scale(1.22); }
      55%  { transform: scale(0.95); }
      75%  { transform: scale(1.06); }
      100% { transform: scale(1); }
    }
    .kills-count.bump { animation: killbump 0.55s cubic-bezier(0.34,1.56,0.64,1); }

    /* ── TIMER BAR (durée du panel courant) ── */
    .panel-timer {
      position: absolute;
      bottom: 0; left: 0;
      height: 2px;
      background: rgba(64,212,212,0.35);
      transition: width linear;
    }
  </style>
</head>

    <div class="hud-left">

  </div>

  </div>

  <!-- ── BARRE DE PROGRESSION EN BAS ── -->
  <div class="hud-bottom" id="hud-bottom">

    <div class="progress-markers" id="progress-markers"></div>
    <div class="frag-layer" id="frag-layer"></div>
  </div>

</div>

    "Warlord Brogg":                   "../gloire/images/guet-tempete.jpg",
    "Noor, The Betrayer":              "../gloire/images/la-chute-cithrel.jpg",
    "Ancient Koros":                   "../gloire/images/la-chute-cithrel.jpg",
    "Cithrel":                         "../gloire/images/la-chute-cithrel.jpg",
    "Drazhul & Brull":                 "../gloire/images/marche-durrak.jpg",
    "Sin-Magir":                       "../gloire/images/sables-empyreens.jpg",
    "Fodir Kaldur":                    "../gloire/images/saccage-de-drakheim.jpg",
    "Chilgar the Drowned":             "../gloire/images/saccage-de-drakheim.jpg",
    "Auga Handhafi the Blind":         "../gloire/images/saccage-de-drakheim.jpg",
    "Xurath, Fist of the Warden":      "../gloire/images/ruins-of-regath.jpg",
    "Overlord Varux":                  "../gloire/images/scryers-peak.jpg",
    "Xul'vorith, Sentinel of the Bloodbound Gate": "../gloire/images/xul-the-blood-monolith.jpg",
    "Han-Eth, Sentry of Xul":          "../gloire/images/xul-the-blood-monolith.jpg",
    "Vel'korath the Sanctified, Vision of the Covenant": "../gloire/images/xul-the-blood-monolith.jpg",
  };
  function dungeonImg(boss) { return BOSS_TO_DUNGEON_IMG[boss] || ''; }

  async function sbPost(path, body) {
    const r = await fetch(SUPABASE_URL + path, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(body),
    });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  }

  // ── État ──
  let _data       = null;
  let _prevTotal  = null;
  let _unlockedTiers = new Set();

  // ── Fetch ──
  async function fetchData() {
    try {
      const summary = await sbPost('/rest/v1/rpc/get_pagaille_summary', { season_filter: SEASON });
      _data = summary;
      updateHUD();
    } catch(e) {
      console.error('Fetch error:', e);
    }
  }

  // ─────────────────────────────────────────────────────────
  // EFFETS PUNCHY : compteur de kills
  // ─────────────────────────────────────────────────────────
  function playKillCounterFx(delta) {
    const block = document.querySelector('.kills-block');
    if (!block) return;

    // 1) Anneau qui pulse derrière le chiffre
    const ring = document.getElementById('kills-burst-ring');
    if (ring) {
      ring.classList.remove('go');
      void ring.offsetWidth;
      ring.classList.add('go');
    }

    // 2) "+N" qui s'envole au-dessus
    const pop = document.createElement('div');
    pop.className = 'kills-pop';
    pop.textContent = '+' + delta;
    block.appendChild(pop);
    void pop.offsetWidth;
    pop.classList.add('go');
    setTimeout(() => pop.remove(), 1000);

    // 3) Étincelles qui jaillissent
    const sparkCount = Math.min(8, 3 + Math.floor(delta));
    for (let i = 0; i < sparkCount; i++) {
      const spark = document.createElement('div');
      spark.className = 'kills-spark';
      const angle = (Math.random() * Math.PI) - (Math.PI * 1.4); // vers le haut/côtés
      const dist  = 18 + Math.random() * 28;
      spark.style.setProperty('--sx', (Math.cos(angle) * dist).toFixed(1) + 'px');
      spark.style.setProperty('--sy', (Math.sin(angle) * dist).toFixed(1) + 'px');
      spark.style.top = (50 + (Math.random()*10-5)) + '%';
      spark.style.left = (10 + Math.random()*40) + 'px';
      block.appendChild(spark);
      void spark.offsetWidth;
      spark.classList.add('go');
      setTimeout(() => spark.remove(), 700);
    }
  }

  // ─────────────────────────────────────────────────────────
  // EFFETS PUNCHY : barre de progression — fragments qui volent
  // ─────────────────────────────────────────────────────────
  function playProgressFragFx(fromPct, toPct, delta) {
    const bottom = document.getElementById('hud-bottom');
    const layer  = document.getElementById('frag-layer');
    const fillEl = document.getElementById('progress-fill');
    if (!bottom || !layer) return;

    const trackW = bottom.offsetWidth;
    const fromX  = trackW * (fromPct / 100);
    const toX    = trackW * (toPct / 100);

    // Lueur qui glisse sur le front de la barre pendant qu'elle grandit
    if (fillEl) {
      fillEl.classList.remove('growing');
      void fillEl.offsetWidth;
      fillEl.classList.add('growing');
      setTimeout(() => fillEl.classList.remove('growing'), 1600);
    }

    // Nombre de fragments proportionnel au gain, plafonné pour rester lisible
    const fragCount = Math.min(14, 4 + Math.round(delta / 3));

    for (let i = 0; i < fragCount; i++) {
      const frag = document.createElement('div');
      frag.className = 'frag';

      // Origine : dispersée autour du compteur de kills (à gauche du HUD), à hauteur de la barre
      const originX = 40 + Math.random() * 60;
      const originY = -(50 + Math.random() * 40);

      // Destination : un point aléatoire le long du nouveau segment rempli de la barre
      const landX = fromX + Math.random() * Math.max(4, (toX - fromX));

      frag.style.setProperty('--fx0', originX.toFixed(1) + 'px');
      frag.style.setProperty('--fy0', originY.toFixed(1) + 'px');
      frag.style.setProperty('--fx1', landX.toFixed(1) + 'px');
      frag.style.left = '0px';

      const delay    = Math.random() * 250;
      const duration = 550 + Math.random() * 350;
      frag.style.animationDelay = delay + 'ms';
      frag.style.animationDuration = duration + 'ms';

      layer.appendChild(frag);
      requestAnimationFrame(() => frag.classList.add('go'));

      // Petit flash d'impact au point d'atterrissage, une fois le vol terminé
      setTimeout(() => {
        const impact = document.createElement('div');
        impact.className = 'frag-impact';
        impact.style.left = landX.toFixed(1) + 'px';
        layer.appendChild(impact);
        void impact.offsetWidth;
        impact.classList.add('go');
        setTimeout(() => impact.remove(), 550);
        frag.remove();
      }, delay + duration);
    }
  }

  function updateHUD() {
    if (!_data) return;
    const TIERS    = computeTiers(N_PLAYERS);
    const maxTier  = TIERS[TIERS.length - 1];

    // Total kills
    const total = _data.reduce((s, r) => s + (Number(r.total_kills) || 0), 0);

    // Bump animation + effets punchy si nouveau kill
    const countEl = document.getElementById('kills-count');
    const hasIncreased = _prevTotal !== null && total > _prevTotal;
    let delta = 0;

    if (hasIncreased) {
      delta = total - _prevTotal;
      countEl.classList.remove('bump');
      void countEl.offsetWidth;
      countEl.classList.add('bump');
      setTimeout(() => countEl.classList.remove('bump'), 600);
      playKillCounterFx(delta);
    }

    // Calcul du % avant mise à jour, pour connaître le point de départ des fragments
    const prevPct = _prevTotal !== null ? Math.min(100, _prevTotal / maxTier * 100) : 0;

    _prevTotal = total;
    document.getElementById('kills-count-value').textContent = total.toLocaleString();

    // Barre de progression (en bas)
    const bottom   = document.getElementById('hud-bottom');
    const fill     = document.getElementById('progress-fill');
    const pct      = Math.min(100, total / maxTier * 100);
    fill.style.width = pct + '%';
    fill.style.setProperty('--track-w', bottom.offsetWidth + 'px');

    if (hasIncreased && pct > prevPct) {
      playProgressFragFx(prevPct, pct, delta);
    }

    // Marqueurs de paliers
    const markersEl = document.getElementById('progress-markers');
    markersEl.innerHTML = TIERS.map(t =>
      `<div class="tier-marker" data-label="${t.toLocaleString()}" style="left:${(t/maxTier*100).toFixed(2)}%"></div>`
    ).join('');

    // Prochain palier (compact dans la zone gauche)
    const nextTier    = TIERS.find(t => total < t);
    const nextTierIdx = TIERS.findIndex(t => total < t); // 0,1,2 ou -1 si tout débloqué
    const valueEl  = document.getElementById('next-tier-value');
    const remainEl = document.getElementById('next-tier-remain');
    valueEl.classList.remove('tier-1','tier-2','tier-3','tier-done');
    remainEl.classList.remove('tier-1','tier-2','tier-3','tier-done');

    if (nextTier) {
      document.getElementById('next-tier-label').textContent = 'NEXT TIER';
      valueEl.textContent  = nextTier.toLocaleString();
      remainEl.textContent = `${(nextTier - total).toLocaleString()} to go`;
      const tierClass = `tier-${nextTierIdx + 1}`; // tier-1, tier-2, tier-3
      valueEl.classList.add(tierClass);
      remainEl.classList.add(tierClass);
    } else {
      document.getElementById('next-tier-label').textContent = 'STATUS';
      valueEl.textContent  = 'ALL TIERS';
      remainEl.textContent = 'UNLOCKED ✓';
      valueEl.classList.add('tier-done');
      remainEl.classList.add('tier-done');
    }

    // Vérifier milestones
    TIERS.forEach((t, i) => {
      if (total >= t && !_unlockedTiers.has(i)) {
        _unlockedTiers.add(i);
        showMilestone(`Tier ${i+1} unlocked! 🎉`);
      }
    });

    // Mise à jour des panneaux
    updatePanelLB();
    updatePanelBoss();
  }

  function showMilestone(text) {
    const panel = document.getElementById('panel-milestone');
    document.getElementById('milestone-text').textContent = text;
    panel.style.display = '';
  }

  function updatePanelLB() {
    if (!_data) return;
    const scores = _data
      .map(r => ({ name: r.player_name || '?', total: Number(r.total_kills) || 0 }))
      .sort((a, b) => b.total - a.total)
      .slice(0, 5);

    document.getElementById('panel-lb-rows').innerHTML = scores.map((s, i) =>
      `<div class="lb-entry ${i===0?'r1':i===1?'r2':''}">
        <span class="lb-rank">#${i+1}</span>
        <span class="lb-name">${s.name}</span>
        <span class="lb-score">${s.total}</span>
      </div>`
    ).join('');
  }

  function updatePanelBoss() {
    if (!_data) return;
    const bossDeaths = {};
    _data.forEach(r => {
      if (!r.by_boss) return;
      Object.entries(r.by_boss).forEach(([boss, v]) => {
        if (!bossDeaths[boss]) bossDeaths[boss] = 0;
        bossDeaths[boss] += Number(v.deaths) || 0;
      });
    });

    const sorted = Object.entries(bossDeaths)
      .sort(([,a],[,b]) => b - a)
      .filter(([,d]) => d > 0)
      .slice(0, 4);

    if (!sorted.length) {
      document.getElementById('panel-boss-rows').innerHTML = '<div class="boss-entry" style="color:var(--text-muted);font-size:13px">No deaths yet</div>';
      return;
    }

    document.getElementById('panel-boss-rows').innerHTML = sorted.map(([boss, deaths]) => {
      const dImg = dungeonImg(boss);
      return `<div class="boss-entry">
        ${dImg ? `<div class="boss-entry-bg" style="background-image:url('${dImg}')"></div><div class="boss-entry-overlay"></div>` : ''}
        <img class="boss-avatar" src="${bossImg(boss)}" alt="${boss}" onerror="this.style.opacity='0.2'">
        <span class="boss-name">${boss}</span>
        <span class="boss-deaths">${deaths}☠</span>
      </div>`;
    }).join('');
  }

  // ── ROTATION PANNEAUX ──
  const PANELS_BASE = ['panel-lb', 'panel-boss'];  // panels normaux
  const PANEL_EVENT = 'panel-event';
  const PANEL_MILESTONE = 'panel-milestone';
  const EVENT_CHANCE = 0.25;        // 1 chance sur 4
  const EVENT_DURATION_MS = 20000;  // 20s pour le panel event

  let _currentPanel  = null;
  let _rotationTimer = null;
  let _milestoneQueue = [];

  function buildRotation() {
    // Panels normaux + milestone si dispo
    const panels = [...PANELS_BASE];
    const milestoneEl = document.getElementById('panel-milestone');
    if (milestoneEl && milestoneEl.style.display !== 'none') {
      panels.push(PANEL_MILESTONE);
    }
    return panels;
  }

  function showPanel(id, duration) {
    // Retirer l'ancien
    if (_currentPanel) {
      const old = document.getElementById(_currentPanel);
      if (old) { old.classList.add('exit'); setTimeout(() => { old.classList.remove('active','exit'); }, 500); }
    }
    _currentPanel = id;
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.add('active');
    updateDots(id);
    animateTimerBar(duration);
    clearTimeout(_rotationTimer);
    _rotationTimer = setTimeout(nextPanel, duration);
  }

  function animateTimerBar(duration) {
    const bar = document.getElementById('panel-timer');
    if (!bar) return;
    // Reset instantané
    bar.style.transition = 'none';
    bar.style.width = '100%';
    void bar.offsetWidth; // force reflow
    // Vidage progressif sur toute la durée
    bar.style.transition = `width ${duration}ms linear`;
    bar.style.width = '0%';
  }

  function nextPanel() {
    const panels = buildRotation();

    // 1 chance sur 4 : afficher panel event d'abord
    if (Math.random() < EVENT_CHANCE) {
      showPanel(PANEL_EVENT, EVENT_DURATION_MS);
      // Après le panel event, reprendre la rotation normale
      clearTimeout(_rotationTimer);
      _rotationTimer = setTimeout(() => rotateTo(panels), EVENT_DURATION_MS);
      return;
    }

    rotateTo(panels);
  }

  function rotateTo(panels) {
    // Choisit un panel différent du courant
    const available = panels.filter(p => p !== _currentPanel);
    const next = available[Math.floor(Math.random() * available.length)] || panels[0];
    const duration = randomDuration();
    showPanel(next, duration);
  }

  function randomDuration() {
    // Entre 60s et 120s
    return (60 + Math.random() * 60) * 1000;
  }

  function updateDots(activeId) {
    const panels = [...PANELS_BASE, PANEL_EVENT];
    const dotsEl = document.getElementById('panel-dots');
    dotsEl.innerHTML = panels.map(id =>
      `<div class="panel-dot ${id === activeId ? 'active' : ''}"></div>`
    ).join('');
  }

  // ── INIT ──
  async function init() {
    await fetchData();

    // Sync background-size au resize
    new ResizeObserver(() => {
      const bottom = document.getElementById('hud-bottom');
      const fill   = document.getElementById('progress-fill');
      if (bottom && fill) fill.style.setProperty('--track-w', bottom.offsetWidth + 'px');
    }).observe(document.getElementById('hud-bottom'));

    // Démarrer la rotation sur le leaderboard
    showPanel('panel-lb', randomDuration());

    // Refresh toutes les 20min, décalé de 5min après chaque créneau du cron (:00,:20,:40)
    // Ex: cron à 9h00 → overlay refetch à 9h05, 9h25, 9h45...
    const now = new Date();
    const minutes = now.getMinutes();
    const msSinceLastSlot = (minutes % 20) * 60000 + now.getSeconds() * 1000;
    const msToOffset = ((5 * 60000) - msSinceLastSlot + (20 * 60000)) % (20 * 60000);
    const initialDelay = msToOffset || (20 * 60000);

    setTimeout(() => {
      fetchData();
      setInterval(fetchData, REFRESH_MS);
    }, initialDelay);
  }

  init();
</script>
