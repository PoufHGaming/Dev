<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donjon en Pagaille — Overlay</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --teal:      #40d4d4;
      --teal-light:#72e8e8;
      --teal-dim:  #2a9898;
      --tier1:     #44ee44;
      --tier2:     #40d4d4;
      --tier3:     #c4a0ff;
      --bg:        rgba(5, 10, 10, 0.88);
      --bg2:       rgba(10, 20, 20, 0.75);
      --border:    rgba(64,212,212,0.3);
      --text:      #f0fafa;
      --text-dim:  #9fd8d8;
      --text-muted:#4d8080;
      --h: 80px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1920px;
      height: var(--h);
      overflow: hidden;
      background: transparent;
      font-family: 'Cinzel', serif;
    }

    .hud {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--h);
      display: flex;
      flex-direction: column;
      background: var(--bg);
      border-top: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }

    .hud::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg,
        transparent 0%, var(--teal-dim) 15%,
        var(--teal) 50%, var(--teal-dim) 85%, transparent 100%
      );
      z-index: 2;
    }

    .hud-main {
      display: flex;
      align-items: stretch;
      flex: 1;
      min-height: 0;
    }

    .hud-left {
      flex-shrink: 0;
      width: 380px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 20px;
      border-right: 1px solid var(--border);
      position: relative;
      overflow: visible;
    }

    .event-label {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex-shrink: 0;
    }
    .event-name {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-dim);
      font-weight: 600;
    }
    .event-season {
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--teal-light);
      font-weight: 700;
    }

    .divider-v { width: 1px; background: var(--border); align-self: stretch; margin: 10px 0; flex-shrink:0; }

    .kills-block {
      display: flex;
      flex-direction: column;
      gap: 1px;
      flex-shrink: 0;
      position: relative;
      overflow: visible;
    }
    .kills-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      font-weight: 600;
    }
    .kills-count {
      font-size: 34px;
      font-weight: 700;
      color: var(--teal-light);
      letter-spacing: 0.05em;
      line-height: 1;
      position: relative;
      display: inline-block;
      overflow: visible;
    }

    .kills-count-value {
      display: inline-block;
      transform-origin: left center;
      text-shadow: 0 0 24px rgba(64,212,212,0.85), 0 0 2px rgba(64,212,212,0.5);
    }

    .kills-count-value.charging {
      animation: chargeGrow 2.2s cubic-bezier(0.3,0,0.5,1) forwards, chargeShake 2.2s linear forwards;
      color: #fff;
    }
    @keyframes chargeGrow {
      0%   { transform: scale(1); text-shadow: 0 0 24px rgba(64,212,212,0.85), 0 0 2px rgba(64,212,212,0.5); }
      100% { transform: scale(1.55); text-shadow: 0 0 50px rgba(255,255,255,1), 0 0 90px rgba(64,212,212,0.9); }
    }
    @keyframes chargeShake {
      0%, 100% { margin-left: 0; }
      85% { margin-left: 0; }
      86% { margin-left: -1px; }
      87% { margin-left: 1px; }
      88% { margin-left: -1px; }
      89% { margin-left: 1px; }
      90% { margin-left: -2px; }
      91% { margin-left: 2px; }
      92% { margin-left: -2px; }
      93% { margin-left: 2px; }
      94% { margin-left: -3px; }
      95% { margin-left: 3px; }
      96% { margin-left: -3px; }
      97% { margin-left: 3px; }
      98% { margin-left: -2px; }
      99% { margin-left: 2px; }
    }

    .kills-count-value.exploding {
      animation: explodeOut 0.4s cubic-bezier(0.5,0,1,1) forwards;
    }
    @keyframes explodeOut {
      0%   { opacity: 1; transform: scale(1.55); filter: brightness(1); }
      30%  { opacity: 1; transform: scale(1.8); filter: brightness(2.5); }
      100% { opacity: 0; transform: scale(2.2); filter: brightness(3); }
    }

    .kills-count-value.revealing {
      animation: revealIn 0.6s cubic-bezier(0.2,1.3,0.4,1) forwards;
    }
    @keyframes revealIn {
      0%   { opacity: 0; transform: scale(0.4); text-shadow: 0 0 0 rgba(64,212,212,0); }
      45%  { opacity: 1; transform: scale(1.7); text-shadow: 0 0 60px rgba(255,255,255,1), 0 0 100px rgba(64,212,212,1); color: #fff; }
      100% { opacity: 1; transform: scale(1); text-shadow: 0 0 24px rgba(64,212,212,0.85), 0 0 2px rgba(64,212,212,0.5); color: var(--teal-light); }
    }

    .kills-flash {
      position: absolute;
      left: -10px; top: 50%;
      width: 110px; height: 110px;
      transform: translate(0,-50%) scale(0);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.95) 0%, rgba(64,212,212,0.7) 40%, rgba(64,212,212,0) 75%);
      opacity: 0;
      pointer-events: none;
      z-index: 3;
    }
    .kills-flash.go {
      animation: killFlash 0.5s ease-out forwards;
    }
    @keyframes killFlash {
      0%   { opacity: 0; transform: translate(0,-50%) scale(0.2); }
      25%  { opacity: 1; transform: translate(0,-50%) scale(1.1); }
      100% { opacity: 0; transform: translate(0,-50%) scale(2); }
    }

    .kills-shard {
      position: absolute;
      width: 5px; height: 5px;
      background: var(--teal-light);
      box-shadow: 0 0 8px 2px rgba(64,212,212,0.9);
      border-radius: 1px;
      top: 50%; left: 20px;
      opacity: 0;
      pointer-events: none;
      z-index: 4;
      will-change: transform, opacity;
    }
    .kills-shard.go {
      animation-name: shardOut;
      animation-timing-function: cubic-bezier(0.2,0.8,0.3,1);
      animation-fill-mode: forwards;
    }
    @keyframes shardOut {
      0%   { opacity: 1; transform: translate(0,0) scale(1); }
      100% { opacity: 0.9; transform: translate(var(--kx,20px), var(--ky,-20px)) scale(0.6); }
    }

    .next-tier-block {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex-shrink: 0;
    }
    .next-tier-label {
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--text-dim);
      text-transform: uppercase;
      font-weight: 600;
    }
    .next-tier-value {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      transition: color 0.3s;
    }
    .next-tier-remain {
      font-size: 11px;
      letter-spacing: 0.08em;
      font-weight: 600;
      color: var(--text-dim);
      transition: color 0.3s;
    }
    .next-tier-value.tier-1, .next-tier-remain.tier-1 { color: #5dff5d; text-shadow: 0 0 10px rgba(93,255,93,0.5); }
    .next-tier-value.tier-2, .next-tier-remain.tier-2 { color: #5df0f0; text-shadow: 0 0 10px rgba(93,240,240,0.5); }
    .next-tier-value.tier-3, .next-tier-remain.tier-3 { color: #d4aaff; text-shadow: 0 0 10px rgba(212,170,255,0.5); }
    .next-tier-value.tier-done, .next-tier-remain.tier-done { color: #5dff5d; text-shadow: 0 0 12px rgba(93,255,93,0.6); }

    .hud-sep {
      flex-shrink: 0;
      width: 1px;
      background: var(--border);
    }

    .hud-right {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .panel {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      padding: 0 28px;
      gap: 20px;
      opacity: 0;
      transform: translateX(30px);
      transition: opacity 0.5s ease, transform 0.5s ease;
      pointer-events: none;
    }
    .panel.active {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }
    .panel.exit {
      opacity: 0;
      transform: translateX(-30px);
    }

    .panel-icon { font-size: 22px; flex-shrink: 0; filter: drop-shadow(0 0 8px rgba(64,212,212,0.5)); }

    .panel-title {
      font-size: 10px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--teal-light);
      margin-bottom: 6px;
      font-weight: 700;
    }

    .panel-scroll-wrap {
      overflow: hidden;
      flex: 1;
      min-width: 0;
    }

    .panel-lb-rows {
      display: flex; gap: 10px; align-items: center;
      width: max-content;
      will-change: transform;
    }
    .panel-boss-rows {
      display: flex; gap: 8px; align-items: center;
      width: max-content;
      will-change: transform;
    }
    @keyframes marqueeScroll {
      from { transform: translateX(0); }
      to   { transform: translateX(var(--marquee-distance, -50%)); }
    }
    .lb-entry {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 12px 4px 8px;
      background: var(--bg2); border: 1px solid var(--border); border-radius: 3px;
    }
    .lb-rank { font-size: 11px; color: var(--text-dim); letter-spacing: 0.1em; font-weight: 700; min-width: 18px; }
    .lb-entry.r1 { border-color: rgba(64,212,212,0.6); }
    .lb-entry.r1 .lb-rank { color: var(--teal-light); }
    .lb-entry.r2 { border-color: rgba(64,212,212,0.35); }
    .lb-name { font-size: 15px; color: var(--text); letter-spacing: 0.04em; font-weight: 600; max-width: 130px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lb-score { font-size: 15px; color: var(--teal-light); font-weight: 700; letter-spacing: 0.05em; text-shadow: 0 0 12px rgba(64,212,212,0.6); }

    .panel-boss-rows { }
    .boss-entry {
      display: flex; align-items: center; gap: 7px;
      padding: 4px 12px; border: 1px solid var(--border); border-radius: 3px;
      position: relative; overflow: hidden;
    }
    .boss-entry-bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
      opacity: 0.35; z-index: 0;
    }
    .boss-entry-overlay {
      position: absolute; inset: 0;
      background: var(--bg2); opacity: 0.55; z-index: 1;
    }
    .boss-avatar { width: 30px; height: 30px; border-radius: 50%; border: 1px solid rgba(64,212,212,0.4); object-fit: cover; flex-shrink: 0; background: rgba(64,212,212,0.05); position: relative; z-index: 2; }
    .boss-name { font-size: 14px; color: var(--text); font-weight: 600; letter-spacing: 0.04em; max-width: 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; position: relative; z-index: 2; text-shadow: 0 1px 4px rgba(0,0,0,0.8); }
    .boss-deaths { font-size: 22px; color: #ff5050; font-weight: 700; letter-spacing: 0.06em; text-shadow: 0 0 10px rgba(255,80,80,0.7), 0 1px 4px rgba(0,0,0,0.8); position: relative; z-index: 2; }

    .panel-event { display: flex; flex-direction: column; gap: 3px; }
    .panel-event-main { font-size: 20px; letter-spacing: 0.06em; color: var(--text); font-weight: 600; }
    .panel-event-main strong { color: var(--teal-light); font-weight: 700; text-shadow: 0 0 16px rgba(64,212,212,0.7); }
    .panel-event-sub { font-size: 11px; letter-spacing: 0.16em; color: var(--text-dim); font-weight: 600; text-transform: uppercase; }

    .panel-milestone { display: flex; flex-direction: column; gap: 3px; }
    .panel-milestone-main { font-size: 20px; font-weight: 700; letter-spacing: 0.06em; color: var(--tier1); text-shadow: 0 0 24px rgba(68,238,68,0.6); }
    .panel-milestone-sub { font-size: 11px; font-weight: 600; letter-spacing: 0.16em; color: var(--text-dim); text-transform: uppercase; }

    .hud-bottom {
      height: 12px;
      position: relative;
      background: rgba(64,212,212,0.04);
      border-top: 1px solid rgba(64,212,212,0.12);
      flex-shrink: 0;
      overflow: visible;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg,
        #1a991a 0%, var(--tier1) 20%,
        #1f8888 40%, var(--tier2) 55%,
        #7744cc 78%, var(--tier3) 100%
      );
      background-size: var(--track-w, 1920px) 100%;
      background-repeat: no-repeat;
      transition: width 1.5s cubic-bezier(0.4,0,0.2,1);
      box-shadow: 0 0 10px rgba(64,212,212,0.35);
      position: relative;
    }
    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 18px;
      background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.9) 100%);
      opacity: 0;
      filter: blur(1px);
    }
    .progress-fill.growing::after {
      animation: edgeGlow 2.2s cubic-bezier(0.4,0,0.2,1) forwards;
    }
    .progress-fill.boosted {
      box-shadow: 0 0 26px rgba(255,255,255,0.9), 0 0 50px rgba(64,212,212,0.8);
    }
    @keyframes edgeGlow {
      0%   { opacity: 0; }
      55%  { opacity: 0.95; }
      80%  { opacity: 0.6; }
      100% { opacity: 0; }
    }
    .progress-markers { position: absolute; inset: 0; pointer-events: none; }
    .tier-marker {
      position: absolute; top: 0; bottom: 0; width: 1px;
      background: rgba(255,255,255,0.3);
    }
    .tier-marker::after {
      content: attr(data-label);
      position: absolute; bottom: calc(100% + 2px);
      left: 50%; transform: translateX(-50%);
      font-size: 8px; letter-spacing: 0.1em;
      color: rgba(255,255,255,0.4);
      white-space: nowrap;
    }

    .frag-layer {
      position: absolute;
      inset: -120px 0 0 0;
      pointer-events: none;
      overflow: visible;
      z-index: 4;
    }
    .frag {
      position: absolute;
      width: 6px; height: 6px;
      background: var(--teal-light);
      box-shadow: 0 0 8px 2px rgba(64,212,212,0.85);
      border-radius: 1px;
      opacity: 0;
      top: 0; left: 0;
      will-change: transform, opacity;
    }
    .frag.go {
      animation-name: fragFly;
      animation-timing-function: cubic-bezier(0.3,0.6,0.25,1);
      animation-fill-mode: forwards;
    }
    @keyframes fragFly {
      0%   { opacity: 1; transform: translate(var(--fx0,0px), var(--fy0,-30px)) scale(1) rotate(0deg); }
      75%  { opacity: 1; }
      100% { opacity: 0; transform: translate(var(--fx1,0px), 120px) scale(0.4) rotate(160deg); }
    }
    .frag-impact {
      position: absolute;
      top: 117px;
      width: 16px; height: 16px;
      margin-left: -8px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.95) 0%, rgba(64,212,212,0.6) 45%, rgba(64,212,212,0) 75%);
      opacity: 0;
      pointer-events: none;
      z-index: 5;
    }
    .frag-impact.go {
      animation: impactPop 0.6s ease-out forwards;
    }
    @keyframes impactPop {
      0%   { opacity: 0.95; transform: scale(0.4); }
      100% { opacity: 0; transform: scale(2.4); }
    }

    .panel-dots { position: absolute; bottom: 6px; right: 16px; display: flex; gap: 5px; align-items: center; }
    .panel-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--text-muted); transition: background 0.3s, transform 0.3s; }
    .panel-dot.active { background: var(--teal-light); transform: scale(1.4); }

    .panel-timer {
      position: absolute;
      bottom: 0; left: 0;
      height: 2px;
      background: rgba(64,212,212,0.35);
      transition: width linear;
    }
  </style>
</head>
<body>

<div class="hud">

  <div class="hud-main">

    <div class="hud-left">
      <div class="event-label">
        <div class="event-name">Dungeon Mayhem</div>
        <div class="event-season">Pre-Season 3</div>
      </div>

      <div class="divider-v"></div>

      <div class="kills-block">
        <div class="kills-label">Bosses killed</div>
        <div class="kills-count" id="kills-count">
          <span class="kills-flash" id="kills-flash"></span>
          <span class="kills-count-value" id="kills-count-value">—</span>
        </div>
      </div>

      <div class="divider-v"></div>

      <div class="next-tier-block">
        <div class="next-tier-label" id="next-tier-label">Next tier</div>
        <div class="next-tier-value" id="next-tier-value">—</div>
        <div class="next-tier-remain" id="next-tier-remain"></div>
      </div>
    </div>

    <div class="hud-sep"></div>

    <div class="hud-right" id="hud-right">

      <div class="panel" id="panel-lb">

          <div class="panel-boss-rows" id="panel-boss-rows"><div class="boss-entry">—</div></div>
        </div>
      </div>

      <div class="panel" id="panel-event">
        <div class="panel-icon">🎮</div>

      <div class="panel" id="panel-milestone" style="display:none">

        <div class="panel-milestone">
          <div class="panel-milestone-main" id="milestone-text">Tier 1 unlocked!</div>
          <div class="panel-milestone-sub">Community reward available</div>

      </div>

    <div id="panel-timer" style="
      position:absolute; bottom:0; left:0; right:0; height:2px;
      background:rgba(64,212,212,0.3);
      transition:none;
      z-index:3;

    <div class="panel-dots" id="panel-dots"></div>
  </div>

  </div>

  <div class="hud-bottom" id="hud-bottom">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    <div class="progress-markers" id="progress-markers"></div>
    <div class="frag-layer" id="frag-layer"></div>
  </div>

</div>

    "Moar'gore, Master of Sacrifice":  "../gloire/images/coeur-de-tuzari.jpg",
    "Vun'Kahr, The Thorned Maw":       "../gloire/images/coeur-de-tuzari.jpg",
    "Prophet Ez'rath":                 "../gloire/images/coeur-de-tuzari.jpg",
    "Vexira, Mother of Nightmares":    "../gloire/images/creux-soyeux.jpg",
    "Warlord Brogg":                   "../gloire/images/guet-tempete.jpg",
    "Noor, The Betrayer":              "../gloire/images/la-chute-cithrel.jpg",
    "Ancient Koros":                   "../gloire/images/la-chute-cithrel.jpg",
    "Cithrel":                         "../gloire/images/la-chute-cithrel.jpg",
    "Drazhul & Brull":                 "../gloire/images/marche-durrak.jpg",
    "Sin-Magir":                       "../gloire/images/sables-empyreens.jpg",
    "Fodir Kaldur":                    "../gloire/images/saccage-de-drakheim.jpg",
    "Chilgar the Drowned":             "../gloire/images/saccage-de-drakheim.jpg",
    "Auga Handhafi the Blind":         "../gloire/images/saccage-de-drakheim.jpg",
    "Xurath, Fist of the Warden":      "../gloire/images/ruins-of-regath.jpg",
    "Overlord Varux":                  "../gloire/images/scryers-peak.jpg",
    "Xul'vorith, Sentinel of the Bloodbound Gate": "../gloire/images/xul-the-blood-monolith.jpg",
    "Han-Eth, Sentry of Xul":          "../gloire/images/xul-the-blood-monolith.jpg",
    "Vel'korath the Sanctified, Vision of the Covenant": "../gloire/images/xul-the-blood-monolith.jpg",
  };
  function dungeonImg(boss) { return BOSS_TO_DUNGEON_IMG[boss] || ''; }

  async function sbPost(path, body) {
    const r = await fetch(SUPABASE_URL + path, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(body),
    });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  }

  let _data       = null;
  let _prevTotal  = null;
  let _unlockedTiers = new Set();
  let _killFxBusy = false;

  async function fetchData() {
    try {
      const summary = await sbPost('/rest/v1/rpc/get_pagaille_summary', { season_filter: SEASON });
      _data = summary;
      updateHUD();
    } catch(e) {
      console.error('Fetch error:', e);
    }
  }

  function spawnShards(count) {
    const block = document.querySelector('.kills-block');
    if (!block) return;
    for (let i = 0; i < count; i++) {
      const shard = document.createElement('div');
      shard.className = 'kills-shard';
      const angle = Math.random() * Math.PI * 2;
      const dist  = 22 + Math.random() * 34;
      shard.style.setProperty('--kx', (Math.cos(angle) * dist).toFixed(1) + 'px');
      shard.style.setProperty('--ky', (Math.sin(angle) * dist).toFixed(1) + 'px');
      shard.style.animationDuration = (450 + Math.random() * 250) + 'ms';
      block.appendChild(shard);
      requestAnimationFrame(() => shard.classList.add('go'));
      setTimeout(() => shard.remove(), 800);
    }
  }

  function playProgressFragFx(fromPct, toPct, delta) {
    const bottom = document.getElementById('hud-bottom');
    const layer  = document.getElementById('frag-layer');
    const fillEl = document.getElementById('progress-fill');
    const killsBlock = document.querySelector('.kills-block');
    if (!bottom || !layer) return;

    const trackW = bottom.offsetWidth;
    const fromX  = trackW * (fromPct / 100);
    const toX    = trackW * (toPct / 100);

    // Position réelle du compteur de kills, relative au frag-layer
    // (qui est positionné à l'intérieur de hud-bottom, en haut de la barre)
    const layerRect = layer.getBoundingClientRect();
    let killsOriginX = 60;
    let killsOriginY = -120;
    if (killsBlock) {
      const kbRect = killsBlock.getBoundingClientRect();
      killsOriginX = (kbRect.left + kbRect.width / 2) - layerRect.left;
      killsOriginY = (kbRect.top + kbRect.height / 2) - layerRect.top;
    }

    const fragCount = Math.min(16, 6 + Math.round(delta / 2));

    for (let i = 0; i < fragCount; i++) {
      const frag = document.createElement('div');
      frag.className = 'frag';

      // Origine dispersée autour du compteur de kills (où le chiffre vient d'exploser)
      const originX = killsOriginX + (Math.random() * 50 - 25);
      const originY = killsOriginY + (Math.random() * 30 - 15);

      const landX = fromX + Math.random() * Math.max(4, (toX - fromX));

      frag.style.setProperty('--fx0', originX.toFixed(1) + 'px');
      frag.style.setProperty('--fy0', originY.toFixed(1) + 'px');
      frag.style.setProperty('--fx1', landX.toFixed(1) + 'px');
      frag.style.left = '0px';

      const delay    = Math.random() * 280;
      const duration = 600 + Math.random() * 380;
      frag.style.animationDelay = delay + 'ms';
      frag.style.animationDuration = duration + 'ms';

      layer.appendChild(frag);
      requestAnimationFrame(() => frag.classList.add('go'));

      setTimeout(() => {
        const impact = document.createElement('div');
        impact.className = 'frag-impact';
        impact.style.left = landX.toFixed(1) + 'px';
        layer.appendChild(impact);
        void impact.offsetWidth;
        impact.classList.add('go');
        setTimeout(() => impact.remove(), 650);
        frag.remove();
      }, delay + duration);
    }

    if (fillEl) {
      fillEl.classList.remove('growing');
      void fillEl.offsetWidth;
      fillEl.classList.add('growing');
      setTimeout(() => {
        fillEl.classList.add('boosted');
        setTimeout(() => fillEl.classList.remove('boosted', 'growing'), 900);
      }, 700);
    }
  }

  function runKillSequence(prevTotal, newTotal, prevPct, newPct) {
    _killFxBusy = true;
    const delta = newTotal - prevTotal;
    const valueEl = document.getElementById('kills-count-value');
    const flashEl = document.getElementById('kills-flash');

    valueEl.classList.remove('charging', 'exploding', 'revealing');
    valueEl.textContent = prevTotal.toLocaleString();

    void valueEl.offsetWidth;
    valueEl.classList.add('charging');

    setTimeout(() => {
      spawnShards(Math.min(10, 4 + delta));
      flashEl.classList.remove('go');
      void flashEl.offsetWidth;
      flashEl.classList.add('go');

      valueEl.classList.remove('charging');
      valueEl.classList.add('exploding');
    }, 2200);

    setTimeout(() => {
      valueEl.classList.remove('exploding');
      valueEl.style.opacity = '0';
    }, 2600);

    setTimeout(() => {
      valueEl.textContent = newTotal.toLocaleString();
      valueEl.style.opacity = '';
      valueEl.classList.add('revealing');
      playProgressFragFx(prevPct, newPct, delta);
    }, 2750);

    setTimeout(() => {
      valueEl.classList.remove('revealing');
      _killFxBusy = false;
    }, 3400);
  }

  function updateHUD() {
    if (!_data) return;
    const TIERS    = computeTiers(N_PLAYERS);
    const maxTier  = TIERS[TIERS.length - 1];

    const total = _data.reduce((s, r) => s + (Number(r.total_kills) || 0), 0);

    const maxTierForPct = maxTier;
    const prevPct = _prevTotal !== null ? Math.min(100, _prevTotal / maxTierForPct * 100) : 0;
    const newPct  = Math.min(100, total / maxTierForPct * 100);

    const hasIncreased = _prevTotal !== null && total > _prevTotal && !_killFxBusy;

    if (hasIncreased) {
      runKillSequence(_prevTotal, total, prevPct, newPct);
    } else if (_prevTotal === null) {
      document.getElementById('kills-count-value').textContent = total.toLocaleString();
    }

    _prevTotal = total;

    const bottom   = document.getElementById('hud-bottom');
    const fill     = document.getElementById('progress-fill');
    fill.style.width = newPct + '%';
    fill.style.setProperty('--track-w', bottom.offsetWidth + 'px');

    const markersEl = document.getElementById('progress-markers');
    markersEl.innerHTML = TIERS.map(t =>
      `<div class="tier-marker" data-label="${t.toLocaleString()}" style="left:${(t/maxTier*100).toFixed(2)}%"></div>`
    ).join('');

    const nextTier    = TIERS.find(t => total < t);
    const nextTierIdx = TIERS.findIndex(t => total < t);
    const valueEl  = document.getElementById('next-tier-value');
    const remainEl = document.getElementById('next-tier-remain');
    valueEl.classList.remove('tier-1','tier-2','tier-3','tier-done');
    remainEl.classList.remove('tier-1','tier-2','tier-3','tier-done');

    if (nextTier) {
      document.getElementById('next-tier-label').textContent = 'NEXT TIER';
      valueEl.textContent  = nextTier.toLocaleString();
      remainEl.textContent = `${(nextTier - total).toLocaleString()} to go`;
      const tierClass = `tier-${nextTierIdx + 1}`;
      valueEl.classList.add(tierClass);
      remainEl.classList.add(tierClass);
    } else {
      document.getElementById('next-tier-label').textContent = 'STATUS';
      valueEl.textContent  = 'ALL TIERS';
      remainEl.textContent = 'UNLOCKED ✓';
      valueEl.classList.add('tier-done');
      remainEl.classList.add('tier-done');
    }

    TIERS.forEach((t, i) => {
      if (total >= t && !_unlockedTiers.has(i)) {
        _unlockedTiers.add(i);
        showMilestone(`Tier ${i+1} unlocked! 🎉`);
      }
    });

    updatePanelLB();
    updatePanelBoss();
  }

  function showMilestone(text) {
    const panel = document.getElementById('panel-milestone');
    document.getElementById('milestone-text').textContent = text;
    panel.style.display = '';
  }

  function updatePanelLB() {
    if (!_data) return;
    const scores = _data
      .map(r => ({ name: r.player_name || '?', total: Number(r.total_kills) || 0 }))
      .sort((a, b) => b.total - a.total)
      .slice(0, 15);

    const rowsHtml = scores.map((s, i) =>
      `<div class="lb-entry ${i===0?'r1':i===1?'r2':''}">
        <span class="lb-rank">#${i+1}</span>
        <span class="lb-name">${s.name}</span>
        <span class="lb-score">${s.total}</span>
      </div>`
    ).join('');

    setupMarquee('panel-lb-rows', rowsHtml, scores.length);
  }

  function updatePanelBoss() {
    if (!_data) return;
    const bossDeaths = {};
    _data.forEach(r => {
      if (!r.by_boss) return;
      Object.entries(r.by_boss).forEach(([boss, v]) => {
        if (!bossDeaths[boss]) bossDeaths[boss] = 0;
        bossDeaths[boss] += Number(v.deaths) || 0;
      });
    });

    const sorted = Object.entries(bossDeaths)
      .sort(([,a],[,b]) => b - a)
      .filter(([,d]) => d > 0)
      .slice(0, 12);

    if (!sorted.length) {
      document.getElementById('panel-boss-rows').innerHTML = '<div class="boss-entry" style="color:var(--text-muted);font-size:13px">No deaths yet</div>';
      return;
    }

    const rowsHtml = sorted.map(([boss, deaths]) => {
      const dImg = dungeonImg(boss);
      return `<div class="boss-entry">
        ${dImg ? `<div class="boss-entry-bg" style="background-image:url('${dImg}')"></div><div class="boss-entry-overlay"></div>` : ''}
        <img class="boss-avatar" src="${bossImg(boss)}" alt="${boss}" onerror="this.style.opacity='0.2'">
        <span class="boss-name">${boss}</span>
        <span class="boss-deaths">${deaths}☠</span>
      </div>`;
    }).join('');

    setupMarquee('panel-boss-rows', rowsHtml, sorted.length);
  }

  // ── MARQUEE : défilement horizontal continu si trop d'entrées pour tenir ──
  const MARQUEE_MIN_ITEMS = 6; // au-delà, on déclenche le défilement
  const MARQUEE_SPEED_PX_PER_S = 22;

  function setupMarquee(containerId, rowsHtml, itemCount) {
    const container = document.getElementById(containerId);
    if (!container) return;

    if (itemCount < MARQUEE_MIN_ITEMS) {
      container.style.animation = 'none';
      container.style.transform = 'none';
      container.innerHTML = rowsHtml;
      return;
    }

    // Duplique le contenu pour un défilement continu sans coupure visible
    container.innerHTML = rowsHtml + rowsHtml;

    requestAnimationFrame(() => {
      const fullWidth = container.scrollWidth / 2;
      const duration  = fullWidth / MARQUEE_SPEED_PX_PER_S;
      container.style.setProperty('--marquee-distance', `-${fullWidth}px`);
      container.style.animation = `marqueeScroll ${duration}s linear infinite`;
    });
  }

  const PANELS_BASE = ['panel-lb', 'panel-boss'];
  const PANEL_EVENT = 'panel-event';
  const PANEL_MILESTONE = 'panel-milestone';
  const EVENT_CHANCE = 0.25;
  const EVENT_DURATION_MS = 20000;

  let _currentPanel  = null;
  let _rotationTimer = null;

  function buildRotation() {
    const panels = [...PANELS_BASE];
    const milestoneEl = document.getElementById('panel-milestone');
    if (milestoneEl && milestoneEl.style.display !== 'none') {
      panels.push(PANEL_MILESTONE);
    }
    return panels;
  }

  function showPanel(id, duration) {
    if (_currentPanel) {
      const old = document.getElementById(_currentPanel);
      if (old) { old.classList.add('exit'); setTimeout(() => { old.classList.remove('active','exit'); }, 500); }
    }
    _currentPanel = id;
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.add('active');
    updateDots(id);
    animateTimerBar(duration);
    clearTimeout(_rotationTimer);
    _rotationTimer = setTimeout(nextPanel, duration);
  }

  function animateTimerBar(duration) {
    const bar = document.getElementById('panel-timer');
    if (!bar) return;
    bar.style.transition = 'none';
    bar.style.width = '100%';
    void bar.offsetWidth;
    bar.style.transition = `width ${duration}ms linear`;
    bar.style.width = '0%';
  }

  function nextPanel() {
    const panels = buildRotation();

    if (Math.random() < EVENT_CHANCE) {
      showPanel(PANEL_EVENT, EVENT_DURATION_MS);
      clearTimeout(_rotationTimer);
      _rotationTimer = setTimeout(() => rotateTo(panels), EVENT_DURATION_MS);
      return;
    }

    rotateTo(panels);
  }

  function rotateTo(panels) {
    const available = panels.filter(p => p !== _currentPanel);
    const next = available[Math.floor(Math.random() * available.length)] || panels[0];
    const duration = randomDuration();
    showPanel(next, duration);
  }

  function randomDuration() {
    return (60 + Math.random() * 60) * 1000;
  }

  function updateDots(activeId) {
    const panels = [...PANELS_BASE, PANEL_EVENT];
    const dotsEl = document.getElementById('panel-dots');
    dotsEl.innerHTML = panels.map(id =>
      `<div class="panel-dot ${id === activeId ? 'active' : ''}"></div>`
    ).join('');
  }

  window.testKillFx = function(delta) {
    delta = delta || 5;
    const current = _prevTotal !== null ? _prevTotal : parseInt(document.getElementById('kills-count-value').textContent.replace(/[^0-9]/g,'')) || 100;
    const newTotal = current + delta;
    const TIERS = computeTiers(N_PLAYERS);
    const maxTier = TIERS[TIERS.length-1];
    const prevPct = Math.min(100, current / maxTier * 100);
    const newPct  = Math.min(100, newTotal / maxTier * 100);
    runKillSequence(current, newTotal, prevPct, newPct);
    _prevTotal = newTotal;
  };

  let _testLoopTimer = null;
  window.testKillFxLoop = function(intervalMs, delta) {
    intervalMs = intervalMs || 8000;
    if (_testLoopTimer) {
      clearInterval(_testLoopTimer);
      _testLoopTimer = null;
      console.log('[testKillFxLoop] stopped');
      return;
    }
    console.log(`[testKillFxLoop] started, firing every ${intervalMs}ms — call testKillFxLoop() again to stop`);
    window.testKillFx(delta);
    _testLoopTimer = setInterval(() => window.testKillFx(delta), intervalMs);
  };

  async function init() {
    await fetchData();

    new ResizeObserver(() => {
      const bottom = document.getElementById('hud-bottom');
      const fill   = document.getElementById('progress-fill');
      if (bottom && fill) fill.style.setProperty('--track-w', bottom.offsetWidth + 'px');
    }).observe(document.getElementById('hud-bottom'));

    showPanel('panel-lb', randomDuration());

    const now = new Date();
    const minutes = now.getMinutes();
    const msSinceLastSlot = (minutes % 20) * 60000 + now.getSeconds() * 1000;
    const msToOffset = ((5 * 60000) - msSinceLastSlot + (20 * 60000)) % (20 * 60000);
    const initialDelay = msToOffset || (20 * 60000);

    setTimeout(() => {
      fetchData();
      setInterval(fetchData, REFRESH_MS);
    }, initialDelay);
  }

  init();
</script>
